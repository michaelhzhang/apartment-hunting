<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Apartment Hunter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="header">
    <span class="logo">🏠</span>
    <span class="title">Apartment Hunter</span>
    <button id="settings-btn" title="Settings">⚙️</button>
  </div>

  <!-- State: not on a StreetEasy rental listing -->
  <div id="view-not-listing" class="view hidden">
    <p>Navigate to a StreetEasy rental listing to save an apartment.</p>
    <p class="hint">URL should match: streeteasy.com/rental/…</p>
  </div>

  <!-- State: settings not configured -->
  <div id="view-no-settings" class="view hidden">
    <p>Set up your work address and API keys before saving listings.</p>
    <button id="open-settings-btn" class="btn-primary">Open Settings</button>
  </div>

  <!-- State: main form -->
  <form id="apartment-form" class="view hidden" autocomplete="off">

    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label for="address">Address</label>
        <input type="text" id="address" placeholder="123 Main St, New York, NY" required>
      </div>
      <div class="form-group" style="flex:1">
        <label for="unit">Unit</label>
        <input type="text" id="unit" placeholder="2L">
      </div>
    </div>

    <div class="form-group">
      <label for="neighborhood">Neighborhood</label>
      <input type="text" id="neighborhood" placeholder="Greenwich Village">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="price">Price&nbsp;($/mo)</label>
        <input type="number" id="price" placeholder="3000" min="0">
      </div>
      <div class="form-group">
        <label for="squareFootage">Sq&nbsp;Ft</label>
        <input type="number" id="squareFootage" placeholder="750" min="0">
      </div>
    </div>

    <div class="form-group">
      <label for="url">Listing Link</label>
      <input type="url" id="url" readonly>
    </div>

    <div class="form-group">
      <label for="availableDate">Available from <span id="avail-now-badge" class="avail-hint hidden">(=TODAY() — updates daily)</span></label>
      <input type="date" id="availableDate" data-now="false">
    </div>

    <fieldset>
      <legend>Amenities</legend>
      <div class="amenities-grid">
        <label class="check-label"><input type="checkbox" id="hasWasherDryer"> W/D in unit</label>
        <label class="check-label"><input type="checkbox" id="hasLaundryInBuilding"> Laundry in building</label>
        <label class="check-label"><input type="checkbox" id="hasElevator"> Elevator</label>
        <label class="check-label"><input type="checkbox" id="hasDoorman"> Doorman</label>
        <label class="check-label"><input type="checkbox" id="hasDishwasher"> Dishwasher</label>
        <label class="check-label"><input type="checkbox" id="hasGym"> Gym</label>
      </div>
    </fieldset>

    <div class="form-group">
      <label for="nearbyTrains">Nearby trains</label>
      <input type="text" id="nearbyTrains" placeholder="A, C, E">
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" placeholder="Anything worth remembering…" rows="3"></textarea>
    </div>

    <!-- Commute preview, shown after first successful API call -->
    <div id="commute-preview" class="commute-preview hidden">
      <div class="commute-row"><span>🚇 Transit</span><span id="transit-time">—</span></div>
      <div class="commute-row"><span>🚶 Walking</span><span id="walking-time">—</span></div>
      <p class="hint">Mon 9 am departure</p>
    </div>

    <div id="status" class="status hidden"></div>

    <button type="submit" id="save-btn" class="btn-primary">Save to Google Sheets</button>
  </form>

  <script src="popup.js"></script>
</body>
</html>
